# Read about fixtures at https://api.rubyonrails.org/classes/ActiveRecord/FixtureSet.html

base:
  critic: base
  selection: base
  score: 3.5

with_original_title:
  critic: base
  selection: with_original_title
  score: 4.5

without_publication:
  critic: without_publication
  selection: base
  score: 2.5

# Additional ratings to meet MIN_RATINGS_FOR_SUMMARY (4) threshold.
# All use created_at in the past so DailySummaryTweet tests (last 24h filter) are unaffected.
# Critics below do NOT have attendances, so cache_average_rating (which scopes to attending critics) is unaffected.

# Base selection: 4 total ratings (3.5, 2.5, 1.0, 1.5) → low average → bombe moirée
frequent_rater_base:
  critic: frequent_rater
  selection: base
  score: 1.0
  created_at: <%= 1.week.ago.to_fs(:db) %>

contrarian_base:
  critic: contrarian
  selection: base
  score: 1.5
  created_at: <%= 1.week.ago.to_fs(:db) %>

# With original title: 4 total ratings (4.5, 0.0, 5.0, 1.0) → high std dev → most divisive
# Also provides a 5-star and 0-star rating for five_star_ratings/zero_star_ratings queries.
without_publication_original:
  critic: without_publication
  selection: with_original_title
  score: 0.0
  created_at: <%= 1.week.ago.to_fs(:db) %>

without_ratings_original:
  critic: without_ratings
  selection: with_original_title
  score: 5.0
  created_at: <%= 1.week.ago.to_fs(:db) %>

frequent_rater_original:
  critic: frequent_rater
  selection: with_original_title
  score: 1.0
  created_at: <%= 1.week.ago.to_fs(:db) %>
